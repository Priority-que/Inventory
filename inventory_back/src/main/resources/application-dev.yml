spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:inventory}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:5000ms}
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          max-wait: -1ms
          min-idle: 0
        shutdown-timeout: 100ms
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat:
        enabled: true
        options:
          model: deepseek-v4-pro
      embedding:
        enabled: true
        options:
          model: text-embedding-v3
    vectorstore:
      redis:
        enabled: true
        index-name: "inventory-agent-rag-index"
        prefix: "inventory:agent:rag:"
        initialize-schema: true

security:
  jwt:
    secret: ${JWT_SECRET:please-change-this-jwt-secret}
    expire-minutes: ${JWT_EXPIRE_MINUTES:120}
    header: Authorization
    prefix: Bearer
    blacklist-prefix: "auth:blacklist:"
mybatis-plus:
  mapper-locations: classpath*:com/xixi/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
