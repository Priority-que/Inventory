spring:
  application:
    name: inventory-back
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
oss:
  endpoint: "https://oss-cn-beijing.aliyuncs.com"
  bucketName: "inventoryxixi"
  access-key-id: ${OSS_ACCESS_KEY_ID}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET}
  base-dir: inventory
server:
  port: 8080
